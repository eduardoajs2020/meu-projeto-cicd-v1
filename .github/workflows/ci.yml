name: ci

on:
  push:
    branches:
      - main
    paths:
      - "frontend/**"
      - ".github/workflows/ci.yml"

  pull_request:
    paths:
      - "frontend/**"
      - ".github/workflows/ci.yml"

permissions:
  contents: read
  packages: write

jobs:

  test:
    name: Lint e testes (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node-version: [18, 20, 22]

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Instalar dependências
        run: npm install

      - name: Rodar linter
        run: npm run lint

      - name: Rodar testes
        run: npm test

  docker:
    name: Build e push da imagem Docker
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Login no GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.AZURE_CLIENT_SECRET }}

     # - name: Build e push do backend
     #   uses: docker/build-push-action@v6
     #   with:
     #     context: nodejs-app/backend
     #     push: true
     #     tags: ghcr.io/${{ github.repository }}/node-backend:latest

      - name: Build e push do frontend
        uses: docker/build-push-action@v6
        with:
          context: frontend
          push: true
          tags: ghcr.io/${{ github.repository }}/node-frontend:latest

  deploy:
    name: Deploy do frontend no GitHub Pages
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Pages
        uses: actions/configure-pages@v5

      - name: Enviar artefato do frontend
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend

      - name: Publicar no Pages
        id: deployment
        uses: actions/deploy-pages@v4
