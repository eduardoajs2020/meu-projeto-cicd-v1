on: 
  push:
    branches: ["main"]
    
  pull_request:
    branches: ["main"]  

  workflow_dispatch:

  jobs:
    build:
      runs-on: ubuntu-latest

      steps:
        - uses: actions/checkout@v4
        - name: Build Docker image
          run: docker build . --file Dockerfile --tag meu-projeto-cicd:latest
        - name: Run Docker container
          run: docker run -d -p 8080:80 meu-projeto-cicd:latest